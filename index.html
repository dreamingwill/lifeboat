<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);background:transparent;padding:0 0 24px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 0 8px}
.tab{padding:6px 12px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:1.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{opacity:.85}
.tab.active{border-color:currentColor}
.card{display:none;border-radius:12px;overflow:hidden;border:1px solid var(--color-border-tertiary)}
.card.active{display:block}
.header{padding:20px 24px 16px;display:flex;align-items:flex-start;gap:16px}
.avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.meta h2{font-size:18px;font-weight:500;margin-bottom:4px}
.meta p{font-size:12px;opacity:.75;margin-bottom:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.body{padding:0 24px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section{padding:12px;border-radius:8px;border:1px solid var(--color-border-tertiary)}
.section h3{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;opacity:.55;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.row .val{font-weight:500}
.stat-bar{height:6px;border-radius:3px;background:var(--color-border-tertiary);margin:6px 0 2px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .4s}
.tip{font-size:12px;line-height:1.7;color:var(--color-text-secondary)}
.tip+.tip{margin-top:4px}
.tip::before{content:"▸ ";font-weight:500}
.warn{font-size:12px;padding:8px 10px;border-radius:6px;line-height:1.6;border-left:3px solid}
.full{grid-column:1/-1}
.verdict{font-size:13px;font-weight:500;padding:10px 14px;border-radius:8px;line-height:1.6;grid-column:1/-1}
</style>
</head>
<body>
<div class="tabs" id="tabs"></div>
<div id="cards"></div>
<script>
const chars=[
{
  id:"captain",icon:"⚓",name:"船长 The Captain",en:"The Captain",
  color:"#993C1D",bg:"#FAECE7",bgt:"#F5C4B3",
  size:7,hp:7,sv:2,
  type:"⚔ 进攻型",special:"现金得分×2",pos:"初始位置 #3",
  tags:["进攻型","财富型","高体型"],
  verdict:"综合实力最强的财富型战士。掌控船头是最高优先级，拿到现金打折换取武器，中期积累现金底牌，末期带着一大堆现金上岸。",
  verdictColor:"#FAECE7",verdictBorder:"#993C1D",
  tips:[
    "第一回合立刻换到船头，优先拿补给牌中的武器和现金",
    "体型7是第二高，抢座/抢劫胜率极高，但要留意大副（体型8）",
    "现金得分×2，优先囤积现金，其他玩家的现金也要抢",
    "口渴需要2水壶（体型高的角色更容易口渴），注意储水",
    "大副体型8比你高，打架要靠武器弥补差距",
    "后期体力消耗大时，保住自己上岸比打死仇人更重要"
  ],
  threat:"大副（体型8）是唯一能正面压制你的角色，早期结盟或先下手",
  ally:"体力低的角色（罗伦/小孩）愿意依附强者，可拉拢保护"
},
{
  id:"mate",icon:"🪝",name:"大副 First Mate",en:"First Mate",
  color:"#3C3489",bg:"#EEEDFE",bgt:"#CECBF6",
  size:8,hp:8,sv:1,
  type:"⚔ 进攻型",special:"无特殊能力（纯战力）",pos:"初始位置 #4",
  tags:["最高体型","打手型","无能力缺陷"],
  verdict:"体型最高但没有任何特殊得分能力，靠战斗和威慑控场。上岸生存分极低（体型8=生存值最低），必须靠财宝分或爱恨分补足，否则打遍天下无敌手最后却输给小孩。",
  verdictColor:"#EEEDFE",verdictBorder:"#3C3489",
  tips:[
    "第一回合换到船头，用体型8的威慑力垄断补给优先选择权",
    "无特殊得分能力：拿什么财宝都行，但要拿得多才够",
    "故意展示武器作为威慑，让弱角色不敢惹你，节省体力",
    "口渴需要最多水壶（体型8），必须持续持有水资源",
    "生存分最低（体型越大生存分越低），上岸不是目标，要让船多漂",
    "最容易被小人物联合针对，注意分化对手的同盟关系"
  ],
  threat:"所有人联合起来打你——小心被弱小角色组团孤立",
  ally:"船长（体型7）是天然盟友，两人联手几乎无人能敌"
},
{
  id:"frenchy",icon:"🥖",name:"水手 Frenchy",en:"Frenchy",
  color:"#854F0B",bg:"#FAEEDA",bgt:"#FAC775",
  size:6,hp:6,sv:3,
  type:"⚔ 综合型",special:"落水时免受1点伤害",pos:"初始位置 #5",
  tags:["综合最强","防御特性","高性价比"],
  verdict:"综合素质最均衡的角色。体型6可以打架，生存分中等，还有落水免1伤的防御特性，在乱局中最能因祸得福。是公认的「最全能」角色。",
  verdictColor:"#FAEEDA",verdictBorder:"#854F0B",
  tips:[
    "落水免1伤：在口渴/被推落水时比别人多一条命，不怕危险局面",
    "体型6可以参与大多数战斗，选边站阵营博取利益",
    "生存分中等，上岸和漂流都有价值，根据爱恨情况灵活决策",
    "可以故意落水再回来，利用免伤特性当「诈死」骗走别人注意力",
    "如果自己恨自己，落水免伤还能让你活更久来积累体型分",
    "抢夺补给时帮人参战，收取「参战报酬」（事后换取协议）"
  ],
  threat:"被孤立最可怕——水手需要结盟才能发挥优势",
  ally:"任意较弱角色，帮他们生存换取情报和保护"
},
{
  id:"stephen",icon:"🎨",name:"斯蒂芬先生 Sir Stephen",en:"Sir Stephen",
  color:"#0F6E56",bg:"#E1F5EE",bgt:"#9FE1CB",
  size:5,hp:5,sv:4,
  type:"💰 财富型",special:"美术品得分×2",pos:"初始位置 #2",
  tags:["中立战力","美术品王","谈判高手"],
  verdict:"游戏中最佳谈判角色。体型5能打能守，生存分中上，美术品加倍让他在财宝竞争中有独特优势。擅长用「你帮我拿美术品，我保护你」的交易推动游戏。",
  verdictColor:"#E1F5EE",verdictBorder:"#0F6E56",
  tips:[
    "美术品得分×2：全力争取，3分美术品对你等于6分，极高价值",
    "体型5：能参战但别当炮灰，在敌方势均力敌时选边站牟利",
    "谈判核心：「把美术品给我，我帮你对付X」，用战力换财宝",
    "初始位置#2，早期有不错的选牌权，快速建立牌库",
    "不需要跟船长/大副硬刚，充当「制衡者」角色更有价值",
    "中期存活率高是最大优势，让财宝慢慢积累到终局"
  ],
  threat:"有人专门不让你拿美术品——需早期建立谈判关系",
  ally:"弱小角色（罗伦/小孩），用保护换取优先选牌机会"
},
{
  id:"lauren",icon:"💎",name:"罗伦小姐 Lady Lauren",en:"Lady Lauren",
  color:"#72243E",bg:"#FBEAF0",bgt:"#F4C0D1",
  size:4,hp:4,sv:5,
  type:"💎 财富型",special:"珠宝得分×2",pos:"初始位置 #1（船头）",
  tags:["最弱战力","最高生存分","珠宝女王"],
  verdict:"最脆弱但生存分最高，而且初始坐在船头，选牌优先级最好。完全靠外交和依附强者存活，核心策略是「让所有人都觉得保护我有利」。",
  verdictColor:"#FBEAF0",verdictBorder:"#72243E",
  tips:[
    "初始在船头！第一回合优先拿珠宝或信号枪（翻盘神器）",
    "体型4打架必输，永远不要拒绝换座，用协商代替对抗",
    "珠宝×2：优先囤积珠宝，用「给你现金换我的珠宝」谈判",
    "让强者觉得保护你有利：「我爱的人在保护我，你打我他会报复」",
    "信号枪（+8体型）如果拿到手，立刻公开展示作为威慑",
    "生存分最高，只要活着上岸就有分，所以保命第一"
  ],
  threat:"所有人的理想抢劫目标，时刻寻找保护伞",
  ally:"船长/大副/水手中任意一位，提供珠宝分成换保护"
},
{
  id:"kid",icon:"🎒",name:"小孩 The Kid",en:"The Kid",
  color:"#27500A",bg:"#EAF3DE",bgt:"#C0DD97",
  size:3,hp:3,sv:6,
  type:"🕵 隐身型",special:"偷窃手牌不触发战斗",pos:"初始位置 #6（船尾）",
  tags:["最高生存分","偷窃大师","隐身猥琐流"],
  verdict:"生存分最高+偷窃无战斗风险，是被严重低估的强力角色。体型3几乎打不过任何人，但完全不需要打架——靠信息差和偷窃慢慢积累，末期靠生存分笑到最后。",
  verdictColor:"#EAF3DE",verdictBorder:"#27500A",
  tips:[
    "偷窃特技：偷别人手牌不触发战斗，是游戏中最安全的资源获取方式",
    "优先偷信号枪（+8体型）——拿到就能以弱击强彻底改变局面",
    "体型3别参战，永远同意换座/被抢，用保命换取战略机会",
    "划船选牌：通过划船获取额外航行牌，掌握游戏进程信息",
    "生存分最高（体型3=生存值6），只要活到上岸必然有高分底线",
    "低调到被所有人遗忘，在终局突然展示积累的财宝反杀"
  ],
  threat:"被人盯住手牌、全部公开防偷——需要趁乱行动",
  ally:"不需要盟友，但可假装依附强者换取「不被针对」的庇护"
}
];

const tl=document.getElementById("tabs");
const cl=document.getElementById("cards");

chars.forEach((c,i)=>{
  const t=document.createElement("div");
  t.className="tab"+(i===0?" active":"");
  t.textContent=c.icon+" "+c.name.split(" ")[0];
  t.style.color=c.color;
  t.style.background=i===0?c.bgt:"transparent";
  t.style.borderColor=i===0?c.color:"transparent";
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach((x,j)=>{
      x.classList.toggle("active",j===i);
      x.style.background=j===i?chars[j].bgt:"transparent";
      x.style.borderColor=j===i?chars[j].color:"transparent";
    });
    document.querySelectorAll(".card").forEach((x,j)=>x.classList.toggle("active",j===i));
  };
  tl.appendChild(t);

  const d=document.createElement("div");
  d.className="card"+(i===0?" active":"");
  d.innerHTML=`
    <div class="header" style="background:${c.bg}">
      <div class="avatar" style="background:${c.color}20;border-color:${c.color}40">${c.icon}</div>
      <div class="meta" style="flex:1">
        <h2 style="color:${c.color}">${c.name}</h2>
        <p>${c.en} · ${c.pos}</p>
        <div class="badges">
          ${c.tags.map(t=>`<span class="badge" style="background:${c.color}18;color:${c.color}">${t}</span>`).join("")}
        </div>
      </div>
    </div>
    <div class="body">
      <div class="section">
        <h3>角色数值</h3>
        <div class="row"><span>体型（战斗力）</span><span class="val" style="color:${c.color}">${c.size}</span></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${c.size/8*100}%;background:${c.color}"></div></div>
        <div class="row"><span>体力（血量上限）</span><span class="val">${c.hp}</span></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${c.hp/8*100}%;background:${c.color}88"></div></div>
        <div class="row"><span>生存分</span><span class="val">${c.sv} 分</span></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${c.sv/6*100}%;background:${c.color}55"></div></div>
        <div class="row" style="margin-top:8px"><span>角色类型</span><span class="val" style="font-size:12px">${c.type}</span></div>
        <div class="row"><span>特殊能力</span><span class="val" style="font-size:12px;color:${c.color}">${c.special}</span></div>
      </div>
      <div class="section">
        <h3>社交关系</h3>
        <p class="tip" style="color:var(--color-text-secondary)">⚠ 重点威胁</p>
        <p style="font-size:12px;line-height:1.6;padding:6px 8px;border-radius:6px;background:${c.color}10;border-left:3px solid ${c.color};margin:4px 0 10px">${c.threat}</p>
        <p class="tip" style="color:var(--color-text-secondary)">🤝 结盟方向</p>
        <p style="font-size:12px;line-height:1.6;padding:6px 8px;border-radius:6px;background:${c.color}08;border-left:3px solid ${c.color}66;margin-top:4px">${c.ally}</p>
      </div>
      <div class="section full">
        <h3>核心打法</h3>
        ${c.tips.map(t=>`<p class="tip">${t}</p>`).join("")}
      </div>
      <div class="verdict" style="background:${c.verdictColor};border-left:4px solid ${c.verdictBorder};color:var(--color-text-primary)">
        <strong style="color:${c.verdictBorder}">总评：</strong>${c.verdict}
      </div>
    </div>
  `;
  cl.appendChild(d);
});
</script>
</body>
</html>
